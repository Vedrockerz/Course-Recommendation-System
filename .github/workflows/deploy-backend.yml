name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          port: ${{ secrets.EC2_PORT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="/home/ubuntu/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="${{ secrets.EC2_APP_PATH }}/venv/bin:$PATH"
            cd ${{ secrets.EC2_APP_PATH }}
            git fetch origin
            git reset --hard origin/main
            # Update YouTube API key in systemd environment file
            echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" | sudo tee /tmp/youtube_env > /dev/null
            if sudo grep -q "^YOUTUBE_API_KEY=" /etc/learnwise-backend.env 2>/dev/null; then
              sudo sed -i '/^YOUTUBE_API_KEY=/d' /etc/learnwise-backend.env
            fi
            sudo cat /tmp/youtube_env >> /etc/learnwise-backend.env
            rm /tmp/youtube_env
            # Restart systemd service to load updated environment
            sudo systemctl restart learnwise-backend