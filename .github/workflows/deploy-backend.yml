name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          port: ${{ secrets.EC2_PORT }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="/home/ubuntu/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="${{ secrets.EC2_APP_PATH }}/venv/bin:$PATH"
            cd ${{ secrets.EC2_APP_PATH }}
            git fetch origin
            git reset --hard origin/main
            # Restart backend with YouTube API key injected via environment
            export YOUTUBE_API_KEY="${{ secrets.YOUTUBE_API_KEY }}"
            which pm2
            /home/ubuntu/.nvm/versions/node/v24.13.0/bin/pm2 restart ${{ secrets.PM2_APP_NAME }} --update-env